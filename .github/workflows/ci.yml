name: FinSim CI

# Every pull request gets the same two checks we run locally. This keeps a broken
# build from reaching main when several workstreams are moving at once.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  document-intelligence:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: document_intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: document_intelligence/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v

  transaction-processing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transaction_processing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transaction_processing/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
